<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Ludo Pro</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --Red: #ea4335; --Green: #34a853; --Yellow: #fbbc05; --Blue: #4285f4;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif; background: #111827; color: white;
            display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px;
            min-height: 100vh; justify-content: center;
        }
        .setup-box { 
            background: #1f2937; padding: 30px; border-radius: 12px; text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #374151;
        }
        input, button { padding: 12px 18px; font-size: 16px; margin: 8px; border-radius: 8px; border: none; outline: none; }
        input { background: #374151; color: white; text-align: center; }
        button { background: #10b981; color: white; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #059669; }
        button:disabled { background: #4b5563; cursor: not-allowed; }
        
        .game-layout { display: flex; gap: 30px; align-items: center; display: none; flex-wrap: wrap; justify-content: center; }
        
        .board {
            display: grid; grid-template-columns: repeat(15, 45px); grid-template-rows: repeat(15, 45px);
            border: 6px solid #1f2937; background: #f3f4f6; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border-radius: 12px; overflow: hidden;
        }
        .cell { border: 1px solid #e5e7eb; box-sizing: border-box; position: relative; }
        
        .red-base { background: var(--Red) !important; }
        .green-base { background: var(--Green) !important; }
        .yellow-base { background: var(--Yellow) !important; }
        .blue-base { background: var(--Blue) !important; }
        
        .token {
            width: 32px; height: 32px; border-radius: 50%; 
            position: absolute; top: 5px; left: 5px; z-index: 10; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4); border: 2.5px solid white;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }
        .token.Red { background: radial-gradient(circle at 30% 30%, #ff8787, var(--Red)); }
        .token.Green { background: radial-gradient(circle at 30% 30%, #69db7c, var(--Green)); }
        .token.Yellow { background: radial-gradient(circle at 30% 30%, #ffe066, var(--Yellow)); }
        .token.Blue { background: radial-gradient(circle at 30% 30%, #74c0fc, var(--Blue)); }

        .token.movable {
            animation: bounce 0.4s infinite alternate;
            box-shadow: 0 0 15px #fff; z-index: 20;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-6px); } }

        .panel { background: #1f2937; padding: 20px; border-radius: 12px; width: 220px; text-align: center; border: 1px solid #374151; }
        .dice-box { 
            width: 60px; height: 60px; background: white; color: black; border-radius: 12px; font-size: 30px; 
            display: flex; align-items: center; justify-content: center; margin: 15px auto; font-weight: bold; 
            box-shadow: inset 0 -4px 0 #cbd5e1, 0 4px 8px rgba(0,0,0,0.3);
        }
        .dice-rolling { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 5% { transform: translate(-1px, -1px) rotate(-1deg); } 10% { transform: translate(-2px, 1px) rotate(1deg); } }

        .voice-status { font-size: 12px; color: #10b981; margin-top: 5px; font-weight: bold; }

        @media (max-width: 750px) {
            body { padding: 5px; }
            .game-layout { flex-direction: column; gap: 15px; }
            .board {
                grid-template-columns: repeat(15, calc(94vw / 15));
                grid-template-rows: repeat(15, calc(94vw / 15));
                border-width: 4px;
            }
            .token { width: calc(94vw / 22); height: calc(94vw / 22); top: 1px; left: 1px; border-width: 1.5px; }
            .panel { width: 94vw; padding: 15px; }
            .dice-box { margin: 10px auto; }
        }
    </style>
</head>
<body>

    <div class="setup-box" id="setup">
        <h2>Ludo Online Pro</h2>
        <p style="color:#9ca3af; font-size:14px;">Microphone permission will be requested for live voice chat</p>
        <input type="text" id="roomInput" placeholder="Room Code" value="LUDO321">
        <br>
        <button onclick="connectToRoom()">Enable Mic & Join</button>
    </div>

    <div class="game-layout" id="gameLayout">
        <div class="board" id="ludoBoard"></div>
        <div class="panel">
            <h3>Team: <span id="myColor">...</span></h3>
            <div class="voice-status" id="voiceStatus">Voice: Idle</div>
            <hr style="border-color:#374151; margin: 15px 0;">
            <h4>Turn: <span id="turnLabel">-</span></h4>
            <button id="rollBtn" onclick="triggerDiceRoll()" style="width:100%">Roll Dice</button>
            <div class="dice-box" id="diceDisplay">-</div>
        </div>
    </div>

    <div id="remoteAudioContainer"></div>

    <script>
        const socket = io();
        let myRoomCode = "";
        let myColor = "";
        let currentGameState = null;
        
        let audioCtx;
        function playSound(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'dice') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if(type === 'move') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(520, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if(type === 'knock') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            }
        }

        let localStream;
        const peerConnections = {}; 
        const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19002' }] };

        const BOARD_PATH = [
            [6,0],[6,1],[6,2],[6,3],[6,4],[6,5],[5,6],[4,6],[3,6],[2,6],[1,6],[0,6],[0,7],
            [0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[6,9],[6,10],[6,11],[6,12],[6,13],[6,14],[7,14],
            [8,14],[8,13],[8,12],[8,11],[8,10],[8,9],[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],[14,7],
            [14,6],[13,6],[12,6],[11,6],[10,6],[9,6],[8,5],[8,4],[8,3],[8,2],[8,1],[8,0],[7,0]
        ];
        const START_INDEX = { 'Red': 1, 'Green': 14, 'Yellow': 27, 'Blue': 40 };

        function buildBoardDOM() {
            const container = document.getElementById('ludoBoard');
            container.innerHTML = "";
            for (let r = 0; r < 15; r++) {
                for (let c = 0; c < 15; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r; cell.dataset.col = c;
                    if (r < 6 && c < 6) cell.classList.add('red-base');
                    else if (r < 6 && c > 8) cell.classList.add('green-base');
                    else if (r > 8 && c < 6) cell.classList.add('blue-base');
                    else if (r > 8 && c > 8) cell.classList.add('yellow-base');
                    else if (r === 6 && c > 0 && c < 6) cell.style.background = "var(--Red)";
                    else if (c === 8 && r > 0 && r < 6) cell.style.background = "var(--Green)";
                    else if (r === 8 && c > 8 && c < 14) cell.style.background = "var(--Yellow)";
                    else if (c === 6 && r > 8 && r < 14) cell.style.background = "var(--Blue)";
                    if (r >= 6 && r <= 8 && c >= 6 && c <= 8) cell.style.background = "#e67e22";
                    container.appendChild(cell);
                }
            }
        }

        async function connectToRoom() {
            myRoomCode = document.getElementById('roomInput').value.trim();
            if(!myRoomCode) return;

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                document.getElementById('voiceStatus').innerText = "Voice: Connected";
            } catch (err) {
                console.warn("Microphone access blocked. Proceeding without voice capability.", err);
                document.getElementById('voiceStatus').innerText = "Voice: Mic Blocked";
            }

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            socket.emit('joinRoom', myRoomCode);
        }

        socket.on('userJoinedVoice', async ({ signalOriginId }) => {
            if (!localStream) return;
            const pc = createPeerConnection(signalOriginId);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('voiceOffer', { targetId: signalOriginId, sdp: offer });
        });

        socket.on('voiceOffer', async ({ senderId, sdp }) => {
            if (!localStream) return;
            const pc = createPeerConnection(senderId);
            await pc.setRemoteDescription(new RTCSessionDescription(sdp));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('voiceAnswer', { targetId: senderId, sdp: answer });
        });

        socket.on('voiceAnswer', async ({ senderId, sdp }) => {
            const pc = peerConnections[senderId];
            if (pc) await pc.setRemoteDescription(new RTCSessionDescription(sdp));
        });

        socket.on('iceCandidate', async ({ senderId, candidate }) => {
            const pc = peerConnections[senderId];
            if (pc) await pc.addIceCandidate(new RTCIceCandidate(candidate));
        });

        socket.on('voiceUserLeft', (socketId) => {
            if (peerConnections[socketId]) {
                peerConnections[socketId].close();
                delete peerConnections[socketId];
                const remoteAudio = document.getElementById(`audio-${socketId}`);
                if (remoteAudio) remoteAudio.remove();
            }
        });

        function createPeerConnection(targetSocketId) {
            const pc = new RTCPeerConnection(rtcConfig);
            peerConnections[targetSocketId] = pc;

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('iceCandidate', { targetId: targetSocketId, candidate: event.candidate });
                }
            };

            pc.ontrack = (event) => {
                let remoteAudio = document.getElementById(`audio-${targetSocketId}`);
                if (!remoteAudio) {
                    remoteAudio = document.createElement('audio');
                    remoteAudio.id = `audio-${targetSocketId}`;
                    remoteAudio.autoplay = true;
                    document.getElementById('remoteAudioContainer').appendChild(remoteAudio);
                }
                remoteAudio.srcObject = event.streams[0];
            };

            return pc;
        }

        socket.on('playerAssigned', (data) => {
            myColor = data.color;
            document.getElementById('myColor').innerText = myColor;
            document.getElementById('myColor').style.color = `var(--${myColor})`;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('gameLayout').style.display = 'flex';
        });

        socket.on('diceRolled', ({ roll, game }) => {
            const diceEl = document.getElementById('diceDisplay');
            diceEl.classList.add('dice-rolling');
            let count = 0;
            const t = setInterval(() => {
                diceEl.innerText = Math.floor(Math.random() * 6) + 1;
                playSound('dice');
                if(++count > 6) {
                    clearInterval(t);
                    diceEl.classList.remove('dice-rolling');
                    diceEl.innerText = roll;
                    renderTokens(game);
                }
            }, 80);
        });

        socket.on('tokenMoved', ({ game, isKnockout }) => {
            if (isKnockout) playSound('knock');
            else playSound('move');
            renderTokens(game);
        });

        socket.on('gameStateUpdate', (game) => {
            currentGameState = game;
            document.getElementById('turnLabel').innerText = game.currentTurn;
            document.getElementById('turnLabel').style.color = `var(--${game.currentTurn})`;
            if (!game.hasRolled) document.getElementById('diceDisplay').innerText = '-';
            document.getElementById('rollBtn').disabled = (game.currentTurn !== myColor || game.hasRolled);
            renderTokens(game);
        });

        function triggerDiceRoll() {
            socket.emit('rollDice', myRoomCode);
        }

        function renderTokens(game) {
            document.querySelectorAll('.token').forEach(el => el.remove());
            ['Red', 'Green', 'Yellow', 'Blue'].forEach(color => {
                game.tokens[color].forEach((step, idx) => {
                    let targetCell = null;
                    if (step === -1) {
                        let baseRows = (color === 'Red' || color === 'Green') ? 2 : 11;
                        let baseCols = (color === 'Red' || color === 'Blue') ? 2 : 11;
                        targetCell = document.querySelector(`[data-row='${baseRows + (idx % 2)}'][data-col='${baseCols + Math.floor(idx / 2)}']`);
                    } else {
                        let globalIdx = (START_INDEX[color] + step) % 52;
                        let coords = BOARD_PATH[globalIdx];
                        if (coords) targetCell = document.querySelector(`[data-row='${coords[0]}'][data-col='${coords[1]}']`);
                    }

                    if (targetCell) {
                        const tokenEl = document.createElement('div');
                        tokenEl.className = `token ${color}`;
                        if (color === myColor && game.currentTurn === myColor && game.hasRolled) {
                            if ((step === -1 && game.diceRoll === 6) || (step >= 0 && step + game.diceRoll <= 57)) {
                                tokenEl.classList.add('movable');
                            }
                        }
                        tokenEl.onclick = () => {
                            if (color !== myColor || !game.hasRolled) return;
                            socket.emit('moveToken', { roomCode: myRoomCode, tokenIndex: idx });
                        };
                        targetCell.appendChild(tokenEl);
                    }
                });
            });
        }

        buildBoardDOM();
    </script>
</body>
</html>
